name: Build Direct APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # ✅ Cache Maven/Gradle dependencies automatically
        cache: 'gradle'

    # ✅ Gradle cache — saves ~2-3 min on every build after first run
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: false

    # ✅ Make gradlew executable
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ✅ Use ./gradlew instead of bare gradle — uses wrapper (correct & faster)
    # --no-daemon: CI mein daemon ki zaroorat nahi
    # --parallel: modules parallel build hote hain
    # --build-cache: incremental builds cache use karte hain
    # --configuration-cache: Gradle config phase skip hoti hai repeat builds mein
    - name: Build Debug APK 🚀
      run: ./gradlew assembleDebug
        --no-daemon
        --parallel
        --build-cache
        --configuration-cache

    - name: Rename APK File
      run: mv app/build/outputs/apk/debug/app-debug.apk StreamVision-App.apk

    - name: Upload Direct APK 🎁
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "Auto-Build-${{ github.run_number }}"
        name: "StreamVision Build #${{ github.run_number }}"
        files: StreamVision-App.apk
