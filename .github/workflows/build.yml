name: Build Direct APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK 🚀
      run: ./gradlew assembleDebug --no-daemon --parallel --build-cache

    - name: Rename APK File
      run: mv app/build/outputs/apk/debug/app-debug.apk StreamVision-App.apk

    - name: Upload Direct APK 🎁
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "Auto-Build-${{ github.run_number }}"
        name: "StreamVision Build #${{ github.run_number }}"
        files: StreamVision-App.apk
